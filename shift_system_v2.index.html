<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ===== SUPABASE =====

// ===== CONSTANTS =====
const CLINICS=[
  {id:'shibuya',name:'渋谷',short:'渋',color:'#2563eb',bg:'#dbeafe'},

const ROLE_ICON={Dr:'🩺',DH:'🪥',DA:'💁'};
const DAYS=['日','月','火','水','木','金','土'];
const SHIFTS=['全日','午前','午後','有給','休み'];
const SHIFT_COLOR={'全日':'#2563eb','午前':'#16a34a','午後':'#ca8a04','有給':'#a21caf','休み':'#94a3b8'};

const TIME_OPTIONS=[];
for(let h=7;h<=21;h++){for(let m=0;m<60;m+=15){if(h===21&&m>0)break;TIME_OPTIONS.push(h*60+m);}}
function fmtMin(m){const h=Math.floor(m/60);const mm=m%60;return (h<10?'0':'')+h+':'+(mm===0?'00':mm)}
function calcRawH(s,e){return Math.max(0,(e-s)/60)}
function calcNetH(raw){return raw>=6?raw-1:raw}
function fmtH(h){const wh=Math.floor(h);const wm=Math.round((h-wh)*60);if(wm===0)return wh+'h';return wh+'h'+wm+'m'}
function fmtDate(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getWeekOfMonth(date){const d=new Date(date.getFullYear(),date.getMonth(),1);return Math.ceil((date.getDate()+d.getDay())/7);}

function defaultSkillItems(){return {Dr:['インプラント','矯正・外科矯正','外科処置','精密根管治療','静脈内鎮静法'],DH:['SRP','ホワイトニング','TBI','メインテナンス','PMTC'],DA:['レセプト入力','器具滅菌管理','カウンセリング補助','在庫管理','ユニット準備']};}
function defaultClinicSettings(){const s={};CLINICS.forEach(c=>{s[c.id]={closedDays:[0],closedDates:[],consecutiveLimit:6,staffingRules:c.id==='shibuya'?{dhDaByDr:{1:{dh:2,da:1},2:{dh:2,da:2},3:{dh:2,da:3}}}:{dhDaByDr:{1:{dh:1,da:1},2:{dh:1,da:2}}}};});return s;}
function defaultStaff(){return [
  {id:'s1',name:'小野 貴庸',role:'Dr',clinic:'shibuya',type:'常勤',email:'',skills:{},weekSchedule:{},level:3},
  {id:'s2',name:'田中 誠',role:'Dr',clinic:'oji',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s3',name:'鈴木 花子',role:'Dr',clinic:'jiyugaoka',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s4',name:'山田 健太',role:'Dr',clinic:'akihabara',type:'非常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s5',name:'伊藤 さくら',role:'DH',clinic:'shibuya',type:'常勤',email:'',skills:{},weekSchedule:{},level:3},
  {id:'s6',name:'渡辺 美咲',role:'DH',clinic:'oji',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s7',name:'中村 あゆみ',role:'DH',clinic:'jiyugaoka',type:'非常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s8',name:'小林 かな',role:'DH',clinic:'akihabara',type:'常勤',email:'',skills:{},weekSchedule:{},level:1},
  {id:'s9',name:'加藤 律子',role:'DA',clinic:'shibuya',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s10',name:'吉田 奈々',role:'DA',clinic:'oji',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
  {id:'s11',name:'松本 しおり',role:'DA',clinic:'jiyugaoka',type:'非常勤',email:'',skills:{},weekSchedule:{},level:1},
  {id:'s12',name:'井上 恵',role:'DA',clinic:'akihabara',type:'常勤',email:'',skills:{},weekSchedule:{},level:2},
];}

function getDaySchedule(staff,dateStr){
  const d=new Date(dateStr);const dow=d.getDay();const wk='w'+getWeekOfMonth(d);
  const ws=staff.weekSchedule||{};
  return (ws[wk]&&ws[wk][dow]?ws[wk][dow]:null)||(ws.base&&ws.base[dow]?ws.base[dow]:null)||null;
}
function calcMonthHours(staffId,shifts,year,month){
  let total=0;
  Object.entries(shifts).forEach(([ds,dayShifts])=>{
    const d=new Date(ds);if(d.getFullYear()!==year||d.getMonth()!==month)return;
    const e=dayShifts[staffId];if(!e||e.shift==='休み'||e.shift==='有給')return;
    let raw=e.startMin!=null?calcRawH(e.startMin,e.endMin):(e.shift==='全日'?8:4);
    total+=calcNetH(raw);
  });
  return total;
}
function isHoliday(dateStr,cs){
  const d=new Date(dateStr);const dow=d.getDay();
  return (cs.closedDays||[]).includes(dow)||(cs.closedDates||[]).includes(dateStr);
}
function checkAlerts(dateStr,clinicId,shifts,staffList,cs){
  const alerts=[];const dayShifts=shifts[dateStr]||{};
  const working=staffList.filter(s=>{const e=dayShifts[s.id];if(!e||e.shift==='休み'||e.shift==='有給')return false;return (e.clinic||s.clinic)===clinicId;});
  const drCnt=working.filter(s=>s.role==='Dr').length;
  const dhCnt=working.filter(s=>s.role==='DH').length;
  const daCnt=working.filter(s=>s.role==='DA').length;
  const req=((cs.staffingRules||{}).dhDaByDr||{})[drCnt];
  if(drCnt>0&&req){if(dhCnt<req.dh)alerts.push('DH不足（'+dhCnt+'/'+req.dh+'）');if(daCnt<req.da)alerts.push('DA不足（'+daCnt+'/'+req.da+'）');}
  const limit=cs.consecutiveLimit||6;
  staffList.forEach(s=>{let cnt=0;const d=new Date(dateStr);for(let i=0;i<30;i++){const ds2=fmtDate(new Date(d.getFullYear(),d.getMonth(),d.getDate()-i));const e2=(shifts[ds2]||{})[s.id];if(e2&&e2.shift!=='休み'&&e2.shift!=='有給'){cnt++;}else break;}if(cnt>=limit)alerts.push(s.name+' '+cnt+'連勤');});
  return alerts;
}

// ===== SUPABASE DB LAYER =====
async function dbLoadAll(){
  const [shiftsRes,staffRes,settingsRes]=await Promise.all([
    supa.from('shifts').select('*'),
    supa.from('staff').select('*'),
    supa.from('settings').select('*'),
  ]);
  // shifts: {date_staffid -> entry}
  const shiftsMap={};
  (shiftsRes.data||[]).forEach(r=>{
    if(!shiftsMap[r.date])shiftsMap[r.date]={};
    shiftsMap[r.date][r.staff_id]={shift:r.shift,clinic:r.clinic,startMin:r.start_min,endMin:r.end_min};
  });
  // staff
  const staffList=(staffRes.data||[]).map(r=>r.data);

  useEffect(()=>{

        const r=payload.new;const old=payload.old;

          React.createElement('div',{className:'cal-grid',style:{marginBottom:4}},DAYS.map((d,i)=>React.createElement('div',{key:i,className:'cal-head',style:{color:i===0?'#dc2626':i===6?'#2563eb':''}},d))),
          React.createElement('div',{className:'cal-grid'},cells2.map((d,i)=>{
            if(!d)return React.createElement('div',{key:'e'+i,className:'cal-cell empty'});
            const ds=fmtDate(new Date(year,month,d));const dow=new Date(year,month,d).getDay();
            const isFixed=(s.closedDays||[]).includes(dow);const isTmp=(s.closedDates||[]).includes(ds);
            return React.createElement('div',{key:d,className:'cal-cell',style:{background:isFixed?'#fef2f2':isTmp?'#fff7ed':'#fff',borderColor:isFixed?'#fca5a5':isTmp?'#fdba74':'#e2e8f0',cursor:isFixed?'default':'pointer'},onClick:()=>{if(isFixed)return;const cur=s.closedDates||[];updateCS(closedModal,'closedDates',isTmp?cur.filter(x=>x!==ds):[...cur,ds]);}},
              React.createElement('div',{className:'cal-date',style:{color:dow===0?'#dc2626':dow===6?'#2563eb':''}},d),
              isFixed&&React.createElement('span',{style:{fontSize:8,color:'#dc2626'}},'定休'),
              isTmp&&!isFixed&&React.createElement('span',{style:{fontSize:8,color:'#c2410c'}},'臨時')
            );
          }))
        );
      })()
    );
  }

  function renderContent(){
    if(tab==='shift')return renderShift();
    if(tab==='staff')return renderStaff();
    if(tab==='skills')return renderSkills();
    if(tab==='overview')return renderOverview();
    if(tab==='report')return renderReport();
    if(tab==='settings')return renderSettings();
    return null;
  }

  if(loading)return React.createElement('div',{className:'loading-screen'},
    React.createElement('div',{className:'spinner'}),
    React.createElement('div',{style:{fontSize:14,color:'#64748b',fontWeight:500}},'データを読み込み中...'),
    React.createElement('div',{style:{fontSize:11,color:'#94a3b8'}},'Supabase に接続しています')
  );

  const syncLabel=syncStatus==='syncing'?'同期中...':syncStatus==='offline'?'オフライン':'同期済み';
  const syncClass=syncStatus==='syncing'?'sync-syncing':syncStatus==='offline'?'sync-offline':'sync-online';

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'sidebar'},
      React.createElement('div',{className:'logo-area'},
        React.createElement('div',{className:'logo-brand'},'Fukukeikai Group'),
        React.createElement('div',{className:'logo-title'},'外来シフト管理'),
        React.createElement('div',{className:'logo-sub'},'クラウド同期版')
      ),
      React.createElement('div',{className:'sb-section'},
        React.createElement('div',{className:'sb-label'},'クリニック'),
        CLINICS.map(c=>React.createElement('button',{key:c.id,className:'clinic-item'+(clinicId===c.id?' active':''),onClick:()=>setClinicId(c.id)},React.createElement('span',{className:'clinic-dot',style:{background:c.color}}),c.name))
      ),
      React.createElement('div',{className:'sb-divider'}),
      React.createElement('div',{className:'sb-section'},
        React.createElement('div',{className:'sb-label'},'メニュー'),
        tabs.map(t=>React.createElement('button',{key:t.id,className:'clinic-item'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.label))
      ),
      React.createElement('div',{className:'sync-indicator'},
        React.createElement('span',{className:'sync-dot '+syncClass}),
        React.createElement('span',{style:{color:'rgba(255,255,255,0.5)',fontSize:10}},syncLabel),
        React.createElement('br',null),
        React.createElement('span',{style:{color:'rgba(255,255,255,0.3)',fontSize:9}},'Supabase リアルタイム同期')
      )
    ),
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('div',{className:'topbar-left'},React.createElement('div',{className:'clinic-badge',style:{background:clinic.bg,color:clinic.color}},React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:clinic.color,display:'inline-block'}}),clinic.name+'院')),
        React.createElement('div',{className:'topbar-right'},
          React.createElement('button',{className:'date-nav-btn',onClick:()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);}},'‹'),
          React.createElement('div',{className:'date-display'},year+'年'+(month+1)+'月'),
          React.createElement('button',{className:'date-nav-btn',onClick:()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);}},'›'),
          React.createElement('button',{className:'today-btn',onClick:()=>{const n=new Date();setYear(n.getFullYear());setMonth(n.getMonth());}},'今月')
        )
      ),
      React.createElement('div',{className:'tabs-bar'},tabs.map(t=>React.createElement('button',{key:t.id,className:'tab-btn'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.label))),
      React.createElement('div',{className:'content'},renderContent())
    ),
    editStaff&&React.createElement(StaffEditModal,{staff:editStaff,onSave:s=>{saveStaffList(staffList.map(x=>x.id===s.id?s:x));setEditStaff(null);},onClose:()=>setEditStaff(null)}),
    wsStaff&&React.createElement(WeekScheduleModal,{staff:wsStaff,onSave:s=>{saveStaffList(staffList.map(x=>x.id===s.id?s:x));setWsStaff(null);},onClose:()=>setWsStaff(null)}),
    skillStaff&&React.createElement(SkillModal,{staff:skillStaff,skillItems,onSave:s=>{saveStaffList(staffList.map(x=>x.id===s.id?s:x));setSkillStaff(null);},onClose:()=>setSkillStaff(null)}),
    printStaff&&React.createElement(PrintModal,{staff:printStaff,year,month,shifts,onClose:()=>setPrintStaff(null)})
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
